<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Crash - Fullscreen</title>
    <style>
        /* Supprime toutes les marges et empêche le scroll */
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: fixed; /* Empêche le rebond sur iOS */
        }

        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }
        
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.8); z-index: 10; color: white;
        }

        .container {
            text-align: center; padding: 40px; border: 4px solid #00ffcc;
            border-radius: 25px; background: #111; width: 90%; max-width: 450px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }

        h1 { margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }

        button {
            padding: 15px 50px; font-size: 22px; font-weight: bold;
            background: #00ffcc; border: none; border-radius: 12px;
            cursor: pointer; transition: transform 0.1s, background 0.2s; 
            margin-top: 20px; text-transform: uppercase;
        }
        button:active { transform: scale(0.95); background: #00cca3; }
        
        .colors { display: flex; gap: 15px; margin: 20px 0; justify-content: center; }
        .dot { width: 40px; height: 40px; border-radius: 10px; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px white; }

        /* Message d'orientation */
        #rotate-message {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; z-index: 100;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        @media (orientation: portrait) { #rotate-message { display: flex; } }
    </style>
</head>
<body>

<div id="rotate-message">
    <h2 style="font-size: 40px;">🔄</h2>
    <h2>MODE PAYSAGE REQUIS</h2>
    <p>Tournez votre téléphone pour jouer.</p>
</div>

<div id="ui">
    <div class="container">
        <h1 id="msg">Geometry Crash</h1>
        <div class="colors">
            <div class="dot active" style="background:#00ffcc" data-color="#00ffcc"></div>
            <div class="dot" style="background:#ffea00" data-color="#ffea00"></div>
            <div class="dot" style="background:#ff0077" data-color="#ff0077"></div>
            <div class="dot" style="background:#0099ff" data-color="#0099ff"></div>
        </div>
        <button id="playBtn">JOUER</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const playBtn = document.getElementById("playBtn");

let isPlaying = false;
let groundY, score = 0, speed = 9, obstacles = [];
let nextSpawnDistance = 400;
let player = { x: 150, y: 0, size: 42, vy: 0, gravity: 0.98, jump: -18, rot: 0, color: "#00ffcc" };

// Redimensionnement dynamique
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 100; // Sol un peu plus haut pour l'esthétique
    if(!isPlaying) player.y = groundY - player.size;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 300));
resize();

// Sélection des couleurs
document.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('click', () => {
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        player.color = dot.dataset.color;
        document.querySelector('.container').style.borderColor = player.color;
        document.getElementById('playBtn').style.background = player.color;
    });
});

function startGame() {
    // Tenter de passer en plein écran
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(()=>{});
    }

    isPlaying = true;
    ui.style.display = "none";
    score = 0;
    speed = 9;
    obstacles = [];
    nextSpawnDistance = 400;
    player.vy = 0;
    player.y = groundY - player.size;
    player.rot = 0;
}

function handleJump() {
    if (isPlaying && player.y >= groundY - player.size - 2) {
        player.vy = player.jump;
    }
}

// Contrôles
playBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
window.addEventListener('keydown', (e) => { if(e.code === "Space" || e.code === "ArrowUp") handleJump(); });
window.addEventListener('touchstart', (e) => { 
    if(isPlaying) { e.preventDefault(); handleJump(); } 
}, {passive: false});
window.addEventListener('mousedown', (e) => { if(isPlaying) handleJump(); });

function update() {
    if (!isPlaying) return;

    player.vy += player.gravity;
    player.y += player.vy;

    // Collision sol
    if (player.y > groundY - player.size) {
        player.y = groundY - player.size;
        player.vy = 0;
        // Aligner la rotation sur 90 degrés à l'atterrissage
        player.rot = Math.round(player.rot / 90) * 90;
    } else {
        player.rot += 7; // Vitesse de rotation en l'air
    }

    // Gestion des obstacles
    const lastObstacle = obstacles[obstacles.length - 1];
    const canSpawn = !lastObstacle || (canvas.width - lastObstacle.x > nextSpawnDistance);

    if (canSpawn) {
        const numSpikes = Math.floor(Math.random() * 3) + 1;
        const spikeWidth = 36;

        for (let i = 0; i < numSpikes; i++) {
            obstacles.push({ 
                x: canvas.width + (i * spikeWidth), 
                w: spikeWidth, 
                h: 42 
            });
        }
        nextSpawnDistance = Math.floor(Math.random() * 350) + 450;
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= speed;

        // Collision Hitbox (légèrement réduite pour être plus juste)
        const hitMargin = 6;
        if (player.x + player.size - hitMargin > o.x && 
            player.x + hitMargin < o.x + o.w && 
            player.y + player.size - hitMargin > groundY - o.h) {
            
            isPlaying = false;
            ui.style.display = "flex";
            document.getElementById("msg").innerText = "SCORE : " + Math.floor(score/10);
        }

        if (o.x < -100) obstacles.splice(i, 1);
    }
    
    speed += 0.0015;
    score++;
}

function draw() {
    // Fond
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Sol
    ctx.fillStyle = "#151515";
    ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
    ctx.fillStyle = player.color;
    ctx.fillRect(0, groundY, canvas.width, 4);

    // Joueur
    ctx.save();
    ctx.translate(player.x + player.size/2, player.y + player.size/2);
    ctx.rotate(player.rot * Math.PI / 180);
    ctx.shadowBlur = 15;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 2;
    ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
    ctx.restore();

    // Obstacles
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#ff2a6d";
    ctx.fillStyle = "#ff2a6d";
    for (let o of obstacles) {
        ctx.beginPath();
        ctx.moveTo(o.x, groundY);
        ctx.lineTo(o.x + (o.w / 2), groundY - o.h);
        ctx.lineTo(o.x + o.w, groundY);
        ctx.fill();
    }

    // Score
    if (isPlaying) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.textAlign = "left";
        ctx.fillText(Math.floor(score/10), 40, 60);
    }

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
