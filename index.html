<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Rhythm Fix</title>
    <style>
        :root { --primary: #00ffcc; --gold: #ffcc00; --admin: #ff0055; }
        * { box-sizing: border-box; user-select: none; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* UI Prioritaire */
        #ui { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.85); z-index: 1000; }
        .container { text-align: center; padding: 30px; border: 3px solid var(--primary); border-radius: 25px; background: #111; width: 85%; max-width: 350px; }
        
        .shop { background: #1a1a1a; padding: 10px; border-radius: 15px; margin-bottom: 20px; }
        .power-btn { background: #333; border: 2px solid #555; color: white; padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; }
        .power-btn.owned { border-color: var(--primary); color: var(--primary); }
        
        /* Bouton JOUER stylisé et fonctionnel */
        #playBtn { 
            padding: 20px; font-size: 24px; background: var(--primary); border: none; 
            border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 0 #008877; active: transform: translateY(4px);
        }
        #playBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #008877; background: #00e6b8; }

        #stats { position: absolute; top: 15px; left: 15px; color: white; z-index: 100; display: flex; gap: 10px; }
        .badge { background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 15px; border: 1px solid var(--gold); font-weight: bold; }
        
        #adminToggle { position: absolute; bottom: 20px; right: 20px; z-index: 1100; font-size: 35px; cursor: pointer; }
        #adminPanel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #050505; border: 3px solid var(--admin); padding: 20px; border-radius: 20px;
            display: none; z-index: 2000; width: 280px; color: white; 
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="stats">
    <div class="badge">🪙 <span id="coinTotal">0</span></div>
    <div class="badge" style="border-color: #ff4444;">💀 <span id="deathTotal">0</span></div>
</div>

<div id="adminToggle" onclick="openAdmin()">⚙️</div>

<div id="adminPanel">
    <h2 style="color:var(--admin); margin:0 0 15px 0;">MOD MENU</h2>
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <span>GOD MODE</span><input type="checkbox" id="godCheck" style="transform:scale(1.5)">
    </div>
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <span>VAISSEAU</span><input type="checkbox" id="shipCheck" style="transform:scale(1.5)">
    </div>
    <button onclick="addMoney()" style="width:100%; padding:10px; background:var(--admin); color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">+1000 PIÈCES</button>
    <button onclick="closeAdmin()" style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px;">FERMER</button>
</div>

<div id="ui">
    <div class="container">
        <h1 style="color:var(--primary); margin-top:0;">RHYTHM CRASH</h1>
        <div class="shop">
            <div class="power-btn" id="buyJump" onclick="buy('jump')"><span>🔥 SAUT FEU</span><span id="txtJump">50 🪙</span></div>
            <div class="power-btn" id="buySpeed" onclick="buy('speed')"><span>⚡ BOOST</span><span id="txtSpeed">80 🪙</span></div>
            <div onclick="resetPowers()" style="font-size:12px; color:#666; text-decoration:underline; cursor:pointer;">Reset les pouvoirs</div>
        </div>
        <button id="playBtn">JOUER</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- VARIABLES ---
let coins = parseInt(localStorage.getItem("coins")) || 0;
let deaths = parseInt(localStorage.getItem("deaths")) || 0;
let powers = JSON.parse(localStorage.getItem("powers")) || { jump: false, speed: false };
let isPlaying = false, godMode = false, shipMode = false;
let obstacles = [], groundY;

let player = { x: 80, y: 0, size: 38, vy: 0, grav: 0.8, jump: -15, rot: 0, grounded: false };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 180;
}
window.onresize = resize;
resize();

// --- SYSTÈME DE JEU ---
function updateUI() {
    document.getElementById("coinTotal").innerText = coins;
    document.getElementById("deathTotal").innerText = deaths;
    document.getElementById("buyJump").className = powers.jump ? "power-btn owned" : "power-btn";
    document.getElementById("buySpeed").className = powers.speed ? "power-btn owned" : "power-btn";
    document.getElementById("txtJump").innerText = powers.jump ? "ACTIF" : "50 🪙";
    document.getElementById("txtSpeed").innerText = powers.speed ? "ACTIF" : "80 🪙";
}

// LE BOUTON JOUER (FIXED)
document.getElementById("playBtn").addEventListener("click", function(e) {
    e.stopPropagation();
    startGame();
});

function startGame() {
    isPlaying = true;
    obstacles = [];
    player.y = groundY - player.size;
    player.vy = 0;
    player.rot = 0;
    document.getElementById("ui").style.display = "none";
}

// --- BOUTONS ACTIONS ---
function buy(type) {
    if(type === 'jump' && coins >= 50 && !powers.jump) { coins -= 50; powers.jump = true; }
    if(type === 'speed' && coins >= 80 && !powers.speed) { coins -= 80; powers.speed = true; }
    save(); updateUI();
}

function resetPowers() { powers.jump = false; powers.speed = false; save(); updateUI(); }
function addMoney() { coins += 1000; save(); updateUI(); }
function openAdmin() { document.getElementById("adminPanel").style.display = "block"; }
function closeAdmin() { document.getElementById("adminPanel").style.display = "none"; }
function save() { localStorage.setItem("coins", coins); localStorage.setItem("deaths", deaths); localStorage.setItem("powers", JSON.stringify(powers)); }

document.getElementById("godCheck").onchange = (e) => godMode = e.target.checked;
document.getElementById("shipCheck").onchange = (e) => shipMode = e.target.checked;

// --- INPUTS ---
let pressing = false;
function handleStart(e) {
    if (!isPlaying) return;
    pressing = true;
    if (player.grounded || shipMode) {
        player.vy = powers.jump ? player.jump * 1.15 : player.jump;
        player.grounded = false;
    }
}
window.addEventListener("mousedown", handleStart);
window.addEventListener("touchstart", (e) => { if(isPlaying) { handleStart(); e.preventDefault(); } }, {passive: false});
window.addEventListener("mouseup", () => pressing = false);
window.addEventListener("touchend", () => pressing = false);

// --- BOUCLE DE JEU ---
function loop() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Sol
    ctx.fillStyle = "#111"; ctx.fillRect(0, groundY, canvas.width, 180);
    ctx.strokeStyle = varColor("--primary"); ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

    if(isPlaying) {
        let currentSpeed = powers.speed ? 14 : 10;

        if(shipMode && pressing) player.vy -= 1.6;
        player.vy += player.grav;
        player.y += player.vy;

        // Limite Sol
        if(player.y > groundY - player.size) {
            player.y = groundY - player.size; player.vy = 0; player.grounded = true;
            if(!shipMode) player.rot = Math.round(player.rot/90)*90;
        } else {
            player.grounded = false;
            player.rot += shipMode ? player.vy * 1.5 : 8;
        }

        // Obstacles
        if(Math.random() < 0.02 && (obstacles.length === 0 || obstacles[obstacles.length-1].x < canvas.width - 350)) {
            obstacles.push({x: canvas.width, n: Math.floor(Math.random()*3)+1});
        }

        for(let i=obstacles.length-1; i>=0; i--) {
            let o = obstacles[i];
            o.x -= currentSpeed;
            
            ctx.fillStyle = "#ff0055";
            for(let j=0; j<o.n; j++) {
                let px = o.x + (j*32);
                ctx.beginPath(); ctx.moveTo(px, groundY); ctx.lineTo(px+16, groundY-38); ctx.lineTo(px+32, groundY); ctx.fill();
                
                // Collision
                if(!godMode && player.x < px+28 && player.x+player.size > px+4 && player.y+player.size > groundY-32) {
                    isPlaying = false; deaths++; save(); updateUI();
                    document.getElementById("ui").style.display = "flex";
                }
            }
            if(o.x < -150) obstacles.splice(i, 1);
        }

        // Dessin Joueur
        ctx.save();
        ctx.translate(player.x+player.size/2, player.y+player.size/2);
        ctx.rotate(player.rot * Math.PI/180);
        ctx.fillStyle = varColor("--primary");
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.strokeStyle = "white"; ctx.lineWidth = 2;
        ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
        // Visage
        ctx.fillStyle = "white"; ctx.fillRect(6, -12, 7, 7); ctx.fillRect(6, 4, 7, 7);
        ctx.restore();
    }

    requestAnimationFrame(loop);
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

updateUI();
loop();
</script>
</body>
</html>
