<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Rhythm - Full Levels</title>
    <style>
        :root { --primary: #00ffcc; }
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        
        #ui { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.85); z-index: 100; color: white; }
        .container { text-align: center; padding: 25px; border: 4px solid var(--primary); border-radius: 40px; background: #0a0a0a; width: 90%; max-width: 450px; }
        
        .row { margin: 15px 0; }
        .selection-grid { display: flex; gap: 8px; justify-content: center; }
        .item { width: 45px; height: 45px; border-radius: 10px; cursor: pointer; border: 2px solid #333; display: flex; align-items: center; justify-content: center; background: #1a1a1a; font-size: 20px; }
        .item.active { border-color: #fff; background: var(--primary); color: #000; }
        
        select { width: 100%; padding: 12px; background: #222; color: white; border: 2px solid #444; border-radius: 12px; font-family: inherit; font-size: 16px; outline: none; }
        
        button { padding: 18px; font-size: 24px; font-weight: 900; background: var(--primary); border: none; border-radius: 20px; cursor: pointer; text-transform: uppercase; color: #000; width: 100%; box-shadow: 0 5px 0 #008877; margin-top: 10px; }
        
        #stats { position: absolute; top: 20px; left: 20px; color: white; font-size: 20px; z-index: 50; }
    </style>
</head>
<body>

<div id="stats">PIÈCES: <span id="coinCount">0</span></div>

<div id="ui">
    <div class="container">
        <h1 style="margin:0;">GEOMETRY RHYTHM</h1>
        
        <div class="row">
            <select id="levelSelect">
                <option value="facile">Difficulté : FACILE</option>
                <option value="moyen" selected>Difficulté : MOYEN</option>
                <option value="difficile">Difficulté : DIFFICILE</option>
                <option value="impossible">Difficulté : IMPOSSIBLE</option>
            </select>
        </div>

        <div class="row">
            <div class="selection-grid" id="faceSelector">
                <div class="item active" data-face="normal">🙂</div>
                <div class="item" data-face="angry">😠</div>
                <div class="item" data-face="cool">😎</div>
                <div class="item" data-face="wow">😲</div>
            </div>
        </div>

        <div class="row">
            <div class="selection-grid" id="colorSelector">
                <div class="item active" style="background:#00ffcc" data-color="#00ffcc"></div>
                <div class="item" style="background:#ffea00" data-color="#ffea00"></div>
                <div class="item" style="background:#ff0077" data-color="#ff0077"></div>
                <div class="item" style="background:#0099ff" data-color="#0099ff"></div>
            </div>
        </div>
        
        <button id="playBtn">JOUER</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const coinDisplay = document.getElementById("coinCount");

let isPlaying = false, isPressing = false;
let score = 0, coins = 0, speed = 10, nextSpawn = 0;
let obstacles = [], portals = [], pillars = [], goldCoins = [];

let player = {
    x: 180, y: 0, size: 40, vy: 0, gravity: 0.95, jump: -16.5, 
    rot: 0, color: "#00ffcc", face: "normal", mode: "cube", grounded: false
};

const diffSettings = {
    facile: { min: 80, max: 110 },
    moyen: { min: 55, max: 80 },
    difficile: { min: 40, max: 55 },
    impossible: { min: 28, max: 38 }
};

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    groundY = canvas.height - 100; ceilingY = 100;
}
window.addEventListener('resize', resize);
resize();

// --- CONTROLES ---
function triggerJump() {
    if (isPlaying && player.grounded && player.mode === "cube") {
        player.vy = player.jump; player.grounded = false;
    }
}
window.addEventListener('mousedown', (e) => { if(e.button === 0) { isPressing = true; triggerJump(); }});
window.addEventListener('mouseup', () => isPressing = false);
window.addEventListener('touchstart', (e) => { isPressing = true; if(isPlaying) { triggerJump(); e.preventDefault(); } }, {passive: false});
window.addEventListener('touchend', () => isPressing = false);
window.addEventListener('keydown', (e) => { if(e.code === "Space" || e.code === "ArrowUp") { isPressing = true; triggerJump(); }});
window.addEventListener('keyup', (e) => { if(e.code === "Space" || e.code === "ArrowUp") isPressing = false; });

// --- UI HANDLERS ---
document.getElementById('faceSelector').onclick = (e) => {
    const item = e.target.closest('.item');
    if(item) {
        document.querySelectorAll('#faceSelector .item').forEach(i => i.classList.remove('active'));
        item.classList.add('active'); player.face = item.dataset.face;
    }
};
document.getElementById('colorSelector').onclick = (e) => {
    const item = e.target.closest('.item');
    if(item) {
        document.querySelectorAll('#colorSelector .item').forEach(i => i.classList.remove('active'));
        item.classList.add('active'); player.color = item.dataset.color;
        document.documentElement.style.setProperty('--primary', player.color);
    }
};

document.getElementById('playBtn').onclick = () => {
    isPlaying = true; score = 0; coins = 0; nextSpawn = 0;
    obstacles = []; portals = []; pillars = []; goldCoins = [];
    coinDisplay.innerText = "0";
    player.mode = "cube"; player.y = groundY - player.size; player.vy = 0; player.rot = 0;
    ui.style.display = "none";
};

function update() {
    if (!isPlaying) return;

    // Physique
    if (player.mode === "ship") {
        player.vy += (isPressing ? -0.85 : 0.85);
        player.vy *= 0.95;
        player.rot = player.vy * 3;
    } else {
        player.vy += player.gravity;
        if (!player.grounded) player.rot += 7;
    }
    player.y += player.vy;

    // Collision Sol
    if (player.y >= groundY - player.size) {
        player.y = groundY - player.size; player.vy = 0; player.grounded = true;
        if(player.mode === "cube") player.rot = Math.round(player.rot/90)*90;
    } else player.grounded = false;

    if (player.y < ceilingY || player.y > groundY) { isPlaying = false; ui.style.display = "flex"; }

    // Generation Obstacles
    if (nextSpawn-- <= 0) {
        const diff = diffSettings[document.getElementById('levelSelect').value];
        if (player.mode === "cube") {
            // Groupe de 1 à 3 spikes
            let group = Math.floor(Math.random() * 3) + 1;
            for(let i=0; i<group; i++) {
                obstacles.push({x: canvas.width + (i*32), w: 32, h: 38});
            }
            if(Math.random() > 0.5) goldCoins.push({x: canvas.width + 50, y: groundY - 140});
        } else {
            // Piliers
            let mid = (groundY + ceilingY) / 2 + Math.sin(score * 0.05) * 80;
            pillars.push({x: canvas.width, w: 60, h: mid - 90 - ceilingY, pos: 'top'});
            pillars.push({x: canvas.width, w: 60, h: groundY - (mid + 90), pos: 'bottom'});
            goldCoins.push({x: canvas.width + 30, y: mid});
        }
        nextSpawn = diff.min + Math.random() * (diff.max - diff.min);
    }

    if (score % 1000 === 0 && score > 0) portals.push({x: canvas.width, type: player.mode==="cube"?"ship":"cube"});

    // Collisions
    [obstacles, pillars, goldCoins, portals].forEach(list => {
        for(let i = list.length - 1; i >= 0; i--) {
            let o = list[i];
            o.x -= speed;
            if (player.x < o.x + (o.w || 30) && player.x + player.size > o.x) {
                if (o.h) { // Mort
                    let yMin = (o.pos === 'top') ? ceilingY : groundY - o.h;
                    let yMax = (o.pos === 'top') ? ceilingY + o.h : groundY;
                    if (player.y < yMax && player.y + player.size > yMin) { isPlaying = false; ui.style.display = "flex"; }
                } else if (o.type) { player.mode = o.type; list.splice(i, 1); } 
                else if (o.y) { // Pièce
                    if (player.y < o.y + 25 && player.y + player.size > o.y - 25) {
                        coins++; coinDisplay.innerText = coins; list.splice(i, 1);
                    }
                }
            }
            if (o.x < -200) list.splice(i, 1);
        }
    });
    score++;
}

function draw() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#111"; ctx.fillRect(0, groundY, canvas.width, 100); ctx.fillRect(0, 0, canvas.width, ceilingY);
    ctx.strokeStyle = player.color; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.moveTo(0, ceilingY); ctx.lineTo(canvas.width, ceilingY); ctx.stroke();

    goldCoins.forEach(c => { ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = "#ff0055";
    obstacles.forEach(o => { ctx.beginPath(); ctx.moveTo(o.x, groundY); ctx.lineTo(o.x+16, groundY-o.h); ctx.lineTo(o.x+32, groundY); ctx.fill(); });
    ctx.fillStyle = "#1a1a1a"; ctx.strokeStyle = player.color;
    pillars.forEach(p => { let y = p.pos==='top'?ceilingY:groundY-p.h; ctx.fillRect(p.x,y,p.w,p.h); ctx.strokeRect(p.x,y,p.w,p.h); });
    portals.forEach(p => { ctx.fillStyle = p.type==="ship"?"#ff00ff":"#00ffff"; ctx.fillRect(p.x,ceilingY+10,30,groundY-ceilingY-20); });

    ctx.save();
    ctx.translate(player.x+player.size/2, player.y+player.size/2); ctx.rotate(player.rot*Math.PI/180);
    ctx.fillStyle = player.color;
    if(player.mode === "cube") { ctx.fillRect(-20,-20,40,40); ctx.strokeStyle="white"; ctx.strokeRect(-20,-20,40,40); }
    else { ctx.beginPath(); ctx.moveTo(-20,15); ctx.lineTo(25,0); ctx.lineTo(-20,-15); ctx.fill(); }
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    if(player.face==="angry"){ctx.fillRect(-12,-10,8,3);ctx.fillRect(4,-10,8,3);ctx.fillRect(-10,8,20,2);}
    else if(player.face==="cool"){ctx.fillRect(-15,-12,30,8);}
    else if(player.face==="wow"){ctx.fillRect(-10,-10,6,8);ctx.fillRect(4,-10,6,8);ctx.fillRect(-6,6,12,6);}
    else {ctx.fillRect(-12,-10,6,6);ctx.fillRect(6,-10,6,6);ctx.fillRect(-8,8,16,2);}
    ctx.restore();

    update(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
