<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Rhythm - Pro Edition</title>
    <style>
        :root { --primary: #00ffcc; --gold: #ffcc00; --fire: #ff4400; --admin: #ff0055; }
        * { box-sizing: border-box; user-select: none; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        
        #ui { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.85); z-index: 100; color: white; }
        .container { text-align: center; padding: 25px; border: 4px solid var(--primary); border-radius: 30px; background: #0a0a0a; width: 90%; max-width: 450px; }
        
        .shop { background: #151515; padding: 15px; border-radius: 20px; border: 1px solid #333; margin: 15px 0; }
        .power-btn { background: #222; border: 2px solid #444; color: white; padding: 10px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 8px; font-family: inherit; }
        .power-btn.owned { border-color: var(--fire); color: var(--fire); }
        .reset-btn { font-size: 10px; color: #666; cursor: pointer; text-decoration: underline; margin-top: 5px; }
        
        button#playBtn { padding: 18px; font-size: 24px; font-weight: 900; background: var(--primary); border: none; border-radius: 15px; cursor: pointer; text-transform: uppercase; color: #000; width: 100%; box-shadow: 0 5px 0 #008877; }
        
        #stats { position: absolute; top: 20px; left: 20px; color: white; font-size: 18px; z-index: 50; display: flex; gap: 15px; }
        .stat-badge { padding: 5px 15px; background: rgba(0,0,0,0.6); border-radius: 20px; border: 1px solid var(--gold); }

        #adminToggle { position: absolute; bottom: 15px; right: 15px; z-index: 200; font-size: 24px; opacity: 0.4; cursor: pointer; }
        #adminPanel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid var(--admin); padding: 25px; border-radius: 20px;
            display: none; z-index: 300; width: 320px; color: white; box-shadow: 0 0 30px rgba(255,0,0,0.5);
        }
        .admin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .admin-action-btn { background: var(--admin); border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="stats">
    <div class="stat-badge">🪙 <span id="coinTotal">0</span></div>
    <div class="stat-badge" style="border-color: #ff4444;">💀 <span id="deathTotal">0</span></div>
    <span id="godModeTag" style="color:red; display:none; font-weight: bold;">[GOD]</span>
</div>

<div id="adminToggle">⚙️</div>

<div id="adminPanel">
    <h2 style="color:var(--admin); margin-top:0; font-size: 20px;">ADMIN PANEL</h2>
    <div class="admin-row">
        <span>GOD MODE</span>
        <input type="checkbox" id="godCheck" style="width:22px; height:22px;">
    </div>
    <div class="admin-row">
        <span>FORCER VAISSEAU</span>
        <input type="checkbox" id="shipCheck" style="width:22px; height:22px;">
    </div>
    <div class="admin-row">
        <span>PIÈCES</span>
        <button class="admin-action-btn" id="addCoinsBtn">+1000</button>
    </div>
    <button id="closeAdminBtn" style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:10px; cursor:pointer;">FERMER</button>
</div>

<div id="ui">
    <div class="container">
        <h1 style="margin:0; font-size: 28px; color:var(--primary);">RHYTHM CRASH</h1>
        <div class="shop">
            <button class="power-btn" id="buyJump"><span>🔥 SAUT DE FEU</span><span id="priceJump">50 🪙</span></button>
            <button class="power-btn" id="buySpeed"><span>⚡ MODE BOOST</span><span id="priceSpeed">80 🪙</span></button>
            <div class="reset-btn" id="resetPowers">Désactiver tous les boosts</div>
        </div>
        <button id="playBtn">JOUER</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

// --- DATA ---
let totalCoins = parseInt(localStorage.getItem("geoCoins")) || 0;
let totalDeaths = parseInt(localStorage.getItem("geoDeaths")) || 0;
let powers = JSON.parse(localStorage.getItem("geoPowers")) || { jump: false, speed: false };
let godMode = false;
let forceShip = false;

let isPlaying = false, isPressing = false;
let currentCoins = 0, speedBase = 9, nextSpawn = 0;
let obstacles = [], goldCoins = [], fireParticles = [];
let groundY;

let player = {
    x: 150, y: 0, size: 40, vy: 0, gravity: 0.9, 
    jumpBase: -15, rot: 0, color: "#00ffcc", grounded: false, mode: "cube"
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 200; 
}
window.addEventListener('resize', resize);
resize();

function updateUI() {
    document.getElementById("coinTotal").innerText = totalCoins;
    document.getElementById("deathTotal").innerText = totalDeaths;
    document.getElementById("buyJump").classList.toggle("owned", powers.jump);
    document.getElementById("buySpeed").classList.toggle("owned", powers.speed);
    document.getElementById("buyJump").querySelector('span:last-child').innerText = powers.jump ? "ACTIF" : "50 🪙";
    document.getElementById("buySpeed").querySelector('span:last-child').innerText = powers.speed ? "ACTIF" : "80 🪙";
}

// --- ADMIN & SHOP LOGIC ---
document.getElementById("adminToggle").onclick = () => document.getElementById("adminPanel").style.display = "block";
document.getElementById("closeAdminBtn").onclick = () => document.getElementById("adminPanel").style.display = "none";
document.getElementById("addCoinsBtn").onclick = () => { totalCoins += 1000; saveData(); updateUI(); };
document.getElementById("godCheck").onchange = (e) => { godMode = e.target.checked; document.getElementById("godModeTag").style.display = godMode ? "inline" : "none"; };
document.getElementById("shipCheck").onchange = (e) => { forceShip = e.target.checked; };
document.getElementById("resetPowers").onclick = () => { powers.jump = false; powers.speed = false; saveData(); updateUI(); };

document.getElementById("buyJump").onclick = () => { if(totalCoins >= 50 && !powers.jump) { totalCoins -= 50; powers.jump = true; saveData(); updateUI(); } };
document.getElementById("buySpeed").onclick = () => { if(totalCoins >= 80 && !powers.speed) { totalCoins -= 80; powers.speed = true; saveData(); updateUI(); } };

function saveData() {
    localStorage.setItem("geoCoins", totalCoins);
    localStorage.setItem("geoDeaths", totalDeaths);
    localStorage.setItem("geoPowers", JSON.stringify(powers));
}

// --- GAMEPLAY ---
function handleInput(isDown) {
    isPressing = isDown;
    if (isPlaying && isDown) {
        if (player.mode === "ship") {
            player.vy -= 1.8; // Pilotage vaisseau
        } else if (player.grounded) {
            let force = powers.jump ? player.jumpBase * 1.15 : player.jumpBase;
            player.vy = force;
            player.grounded = false;
        }
    }
}

window.addEventListener('mousedown', () => handleInput(true));
window.addEventListener('mouseup', () => handleInput(false));
window.addEventListener('touchstart', (e) => { handleInput(true); e.preventDefault(); }, {passive: false});
window.addEventListener('touchend', () => handleInput(false));

document.getElementById('playBtn').onclick = () => {
    isPlaying = true; currentCoins = 0; nextSpawn = 0;
    obstacles = []; goldCoins = []; fireParticles = [];
    player.y = groundY - player.size; player.vy = 0; player.rot = 0;
    player.mode = forceShip ? "ship" : "cube";
    ui.style.display = "none";
};

function update() {
    if (!isPlaying) return;
    let speed = powers.speed ? speedBase * 1.4 : speedBase;

    // Physique
    player.vy += player.mode === "ship" ? 0.45 : player.gravity;
    player.y += player.vy;

    if (player.mode === "cube") {
        if(!player.grounded) player.rot += 7;
        if (player.y >= groundY - player.size) {
            player.y = groundY - player.size; player.vy = 0; player.grounded = true;
            player.rot = Math.round(player.rot/90)*90;
        } else player.grounded = false;
    } else {
        // Mode Vaisseau : Limites haut/bas
        player.rot = player.vy * 2;
        if (player.y > groundY - player.size) { player.y = groundY - player.size; player.vy = 0; }
        if (player.y < 50) { player.y = 50; player.vy = 0; }
    }

    // Spawn Obstacles (1, 2 ou 3 pics)
    if (nextSpawn-- <= 0) {
        let count = Math.floor(Math.random() * 3) + 1; // 1 à 3 pics
        obstacles.push({x: canvas.width, count: count, w: 30 * count, h: 38});
        if(Math.random() > 0.4) goldCoins.push({x: canvas.width + 150, y: groundY - (player.mode === "ship" ? 150 : 120)});
        nextSpawn = 60 + Math.random() * 40;
    }

    // Collisions
    for(let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= speed;
        if (player.x < o.x + o.w - 5 && player.x + player.size > o.x + 5 && player.y + player.size > groundY - o.h + 5) {
            if(!godMode) {
                isPlaying = false; totalDeaths++; totalCoins += currentCoins; saveData(); updateUI(); ui.style.display = "flex";
            }
        }
        if(o.x < -200) obstacles.splice(i, 1);
    }

    // Coins
    for(let i = goldCoins.length - 1; i >= 0; i--) {
        goldCoins[i].x -= speed;
        let c = goldCoins[i];
        if (Math.hypot(player.x - c.x, player.y - c.y) < 40) {
            currentCoins++; goldCoins.splice(i, 1);
        }
    }
}

function draw() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Sol
    ctx.fillStyle = "#111"; ctx.fillRect(0, groundY, canvas.width, 200);
    ctx.strokeStyle = player.color; ctx.lineWidth = 4;
    ctx.strokeRect(-10, groundY, canvas.width+20, 5);

    // Coins
    goldCoins.forEach(c => {
        ctx.fillStyle = varColor("--gold");
        ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
    });

    // Obstacles (Degradé sur les pics)
    obstacles.forEach(o => { 
        let grad = ctx.createLinearGradient(o.x, groundY-o.h, o.x, groundY);
        grad.addColorStop(0, "#ff0055"); grad.addColorStop(1, "#660022");
        ctx.fillStyle = grad;
        for(let n=0; n < o.count; n++) {
            ctx.beginPath();
            ctx.moveTo(o.x + (n*30), groundY);
            ctx.lineTo(o.x + 15 + (n*30), groundY - o.h);
            ctx.lineTo(o.x + 30 + (n*30), groundY);
            ctx.fill();
        }
    });

    // Player
    ctx.save();
    ctx.translate(player.x+player.size/2, player.y+player.size/2); 
    ctx.rotate(player.rot*Math.PI/180);
    
    // Corps
    ctx.fillStyle = player.color;
    ctx.fillRect(-20,-20,40,40);
    ctx.strokeStyle="white"; ctx.lineWidth = 3; ctx.strokeRect(-20,-20,40,40);
    
    // Visage (Yeux)
    ctx.fillStyle = "white";
    ctx.fillRect(5, -12, 8, 8); ctx.fillRect(5, 4, 8, 8); // Yeux
    
    ctx.restore();

    update(); requestAnimationFrame(draw);
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

updateUI();
draw();
</script>
</body>
</html>
